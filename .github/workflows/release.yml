name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push_ghcr:
        description: 'Also push image to GHCR'
        required: false
        default: 'false'
      image_tag:
        description: 'Override image tag when manual (optional)'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  package:
    name: Package dist/*
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Make pack script executable
        run: chmod +x scripts/package_bundle.sh

      - name: Build bundles
        run: ./scripts/package_bundle.sh

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linguoos-dist
          path: dist/*

  docker:
    name: Build & (optionally) push GHCR image
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.push_ghcr == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF##*/}" == v* ]]; then
            TAG="${GITHUB_REF##*/}"
          elif [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/linguoos:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}/linguoos:latest

  release:
    name: Create GitHub Release (attach dist)
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: linguoos-dist
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
